# KTO Configuration
model:
  base_model_path: "./models/sft_checkpoints/final"
  reference_model_name: "Qwen/Qwen3-8B"

prompt:
  enable_thinking: false
  system_prompt: |
    Bạn là chuyên gia tư vấn tuyển sinh và đào tạo học thuật.
    Nhiệm vụ là cung cấp thông tin chính xác, rõ ràng, dễ hiểu dựa trên CONTEXT.

    NGUYÊN TẮC:

    1. Trung thành dữ liệu
    - Chỉ sử dụng thông tin có trong CONTEXT.
    - Ưu tiên số liệu, thời gian, điều kiện cụ thể.

    2. Tổng hợp thông minh
    - Có thể kết hợp nhiều đoạn CONTEXT để trả lời đầy đủ.
    - Nếu cần suy luận, ghi rõ: "Theo cách hiểu từ tài liệu..."

    3. Khi dữ liệu thiếu / mâu thuẫn
    - Nếu thiếu: nêu phần có sẵn và chỉ rõ phần chưa có.
    - Nếu mâu thuẫn: ưu tiên nguồn mới hơn hoặc chính thức hơn.

    4. Chống ảo giác
    - Không tự thêm học phí, lịch thi, chỉ tiêu... nếu CONTEXT không có.

    5. Định dạng
    - In đậm từ khóa quan trọng.
    - Dùng bullet list cho quy trình/hồ sơ.
    - Có thể trích dẫn [Nguồn: ...].

    6. Phong cách
    - Chuyên nghiệp, rõ ràng, thân thiện.
    - Câu hỏi đơn giản: trả lời ngắn gọn trước.

training:
  output_dir: "./models/kto_checkpoints"
  num_train_epochs: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.000001
  weight_decay: 0.01
  warmup_steps: 50
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_total_limit: 3
  fp16: false
  dataloader_num_workers: 4
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  lr_scheduler_type: "cosine"
  report_to: "none"
  remove_unused_columns: false
  evaluation_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: false

tuning:
  # Options: "qlora", "lora", "none".
  # KTO needs a reference policy. With LoRA/QLoRA adapters, TRL can use the
  # base model as reference by disabling the adapter, which avoids keeping a
  # second full Qwen 8B model in GPU memory.
  mode: "qlora"

lora:
  r: 32
  lora_alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"

qlora:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

kto:
  beta: 0.1  # KTO beta parameter
  desirable_weight: 1.0
  undesirable_weight: 1.0
  max_length: 2048
  truncation_mode: "keep_end"

data:
  # Fallback only. Normal training uses data/splits/kto_train built from the aggregated RL dataset.
  train_dataset: "vnu-llm2023-ftdata/qa-daotao-cho-rl"
  val_dataset: "vnu-llm2023-ftdata/qa-daotao-cho-rl"
  test_dataset: "vnu-llm2023-ftdata/qa-daotao-sft"
  preprocessing_num_workers: 4
  # eval_max_samples: 256
  conversion:
    design: "gold_answer_vs_synthetic_negative"
    positive_source: "answer"
    prompt_fields: ["question", "reference|references"]
    negative_strategy_order:
      - "partial_answer_for_multi_intent"
      - "raw_context_dump"
      - "overconfident_placeholder"
      - "generic_non_answer"

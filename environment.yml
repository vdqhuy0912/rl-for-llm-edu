name: rl-llm-edu
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - cudatoolkit=11.8  # Adjust based on your GPU
  - pip
  - pip:
    - huggingface_hub>=0.14.0
    - transformers>=4.30.0
    - datasets>=2.10.0
    - accelerate>=0.20.0
    - peft>=0.19.1
    - trl>=0.7.0
    - bitsandbytes>=0.46.1
    - google-genai
    - openai
    - pandas
    - numpy
    - scikit-learn
    - tqdm
    - wandb
    - python-dotenv
    - pyyaml
    - jupyter
    - matplotlib
    - tabulate
    - black
    - isort
    - flake8
